<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        ul.nav{
            border : 1px solid red;
            list-style: none;
            padding: 0;
            width: 1000px;
            /*height: 40px;*/
            overflow: hidden;
        }
        .nav li{
            border : 1px dashed green;
            /*padding: 0px;
            margin: 0px;*/
            width: 200px;
            height: 60px; ;
            float: left;
            box-sizing: border-box;
            font-size: 18pt;
            text-align: center; /*좌우 가운데 정렬*/
            line-height: 60px; /*행간을 의미 상하 가운데*/
        }

        .nav:hover{
            background-color: rgb(161, 235, 144);
        }
        
    </style>
</head>
<body>
    <h1></h1>
    <h1>Hello World!</h1>
    <ul class="nav">
        <li>HOME</li>
        <li>PEOPLE</li>
        <li>GALERY</li>
        <li>BOARD</li>
        <li>CONTACT</li>
    </ul>
</body>
</html>
