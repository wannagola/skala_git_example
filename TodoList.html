<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TodoList 실습</title>

  <!-- CSS 파일 연결 -->
  <link rel="stylesheet" href="style.css">

  <!-- JavaScript 파일 연결 -->
  <!-- defer는 HTML을 먼저 읽은 뒤 JavaScript를 실행하게 한다. -->
   
  <script src="app.js" defer></script>
  <style>
    /* 모든 요소의 크기 계산 방식을 통일한다. */
    * {
    box-sizing: border-box;
    }

    body {
    margin: 0;
    font-family: Arial, "맑은 고딕", sans-serif;
    background-color: #f3f4f6;
    color: #222;
    }

    /* 전체 앱 영역 */
    .container {
    width: 90%;
    max-width: 600px;
    margin: 60px auto;
    padding: 24px;
    background-color: white;
    border-radius: 16px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    h1 {
    margin: 0;
    text-align: center;
    }

    .description {
    text-align: center;
    color: #666;
    }

    /* 입력 폼 */
    .todo-form {
    display: flex;
    gap: 8px;
    margin-top: 24px;
    }

    .todo-form input {
    flex: 1;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 8px;
    }

    .todo-form button {
    padding: 12px 16px;
    border: none;
    border-radius: 8px;
    color: white;
    background-color: #2563eb;
    cursor: pointer;
    }

    /* 할 일 목록 */
    .todo-list {
    padding: 0;
    margin-top: 20px;
    list-style: none;
    }

    /* 할 일 1개 항목 */
    .todo-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;

    margin-bottom: 10px;
    padding: 12px;

    border: 1px solid #ddd;
    border-radius: 10px;
    background-color: #ffffff;
    }

    /* 완료된 할 일 */
    .todo-item.done span {
    color: #999;
    text-decoration: line-through;
    }

    /* 완료, 삭제 버튼 영역 */
    .todo-actions {
    display: flex;
    gap: 6px;
    }

    .todo-actions button {
    padding: 6px 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    }

    .done-button {
    background-color: #e5e7eb;
    }

    .delete-button {
    color: white;
    background-color: #ef4444;
    }
</style>
  
</head>
<body>
  <main class="container">
    <h1>TodoList</h1>
    <p class="description">오늘 해야 할 일을 입력하고 관리해 봅니다.</p>

    <!-- 할 일 입력 폼 -->
    <form id="todoForm" class="todo-form">
      <input
        type="text"
        id="todoInput"
        placeholder="할 일을 입력하세요"
        autocomplete="off"
      >
      <button type="submit">추가</button>
    </form>

    <!-- 할 일 목록이 출력될 영역 -->
    <ul id="todoList" class="todo-list"></ul>
  </main>
</body>
</html>
